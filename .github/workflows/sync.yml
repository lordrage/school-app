name: Sync Canvas

on:
  schedule:
    - cron: "0 10,15,20,1 * * *"   # ~6 AM, 11 AM, 4 PM, 9 PM Eastern (EDT)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency: canvas-sync

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync from Canvas
        env:
          CANVAS_TOKEN: ${{ secrets.CANVAS_TOKEN }}
          CANVAS_BASE: https://canvas.dccc.edu
        run: python sync.py

      - name: Commit if changed
        run: |
          git config user.name "school-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add school-data.json index.html
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "auto-sync $(date -u +%FT%H:%MZ)"
            git push
          fi
